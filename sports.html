<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .development-notice {
            text-align: center;
            padding: 40px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin: 0 0 10px 0;
        }

        p {
            color: #666;
            margin: 0;
        }

        /* ------------------------------ */
        /* Footer                         */
        /* ------------------------------ */
        footer {
            text-align: center;
            padding: 1rem;
            background: #111;
            color: white;
            margin-top: 2rem;
            border-top: 3px solid #e0f7fa;
            /* Added a subtle top border */
        }
    </style>
</head>

<body>
    <div class="development-notice">
        <h1>🚧 Under Development</h1>
        <p>This section is still in development. Please check back soon!</p>
    </div>

    <footer>
        <p>© 2026 Parth</p>
    </footer>
</body>

</html>
