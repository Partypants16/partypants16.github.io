<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parth | Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="profile-header">
            <img src="profile.jpg" alt="Profile" class="profile-image">
            <h1>Your Name</h1>
            <p class="title">Your Title / Profession</p>
        </div>

        <div class="section">
            <h2>About</h2>
            <p>Write a brief bio about yourself here.</p>
        </div>

        <div class="section">
            <h2>Skills</h2>
            <p>List your key skills and expertise.</p>
        </div>

        <div class="section">
            <h2>Experience</h2>
            <p>Describe your professional experience.</p>
        </div>

        <div class="section">
            <h2>Contact</h2>
            <p>Email: your.email@example.com</p>
            <p>Phone: +1 (555) 123-4567</p>
        </div>
    </div>
</body>
</html>
